<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bitmex Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body th:style="'background: url(/images/bitmex_background.jpg) no-repeat center center fixed;'">
<div style="text-align: center; color: white; background:#000;">
    <h1>Welcome to Bitmex Bot!</h1>
</div>
<div class="text-bg-dark p-3">
    <div class="container" style="text-align: center; color: white">
        <h3 style="text-align: left; font-size: 22px;">API key is : <span th:text="${key}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">API secret : <span th:text="${secret}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Client name : <span th:text="${userName}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Client email : <span th:text="${userEmail}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Client account : <span th:text="${userAccount}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Client currency : <span th:text="${userCurrency}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Last Buy Price : <span th:text="${lastBuyPrice}"></span></h3>
        <h3 style="text-align: left; font-size: 22px;">Last Sell Price : <span th:text="${lastSellPrice}"></span></h3>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"></script>
</body>
</html>
